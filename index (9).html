<style>
  :root { --ink:#d8d2c2; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0c0f12; overflow-x:hidden; font-family:'Cormorant Garamond', Georgia, serif; }
  #spacer { width:1px; }
  #stage { position:fixed; inset:0; width:100%; height:100dvh; display:block; }
  #vignette { position:fixed; inset:0; pointer-events:none; z-index:3;
    background: radial-gradient(ellipse at 50% 52%, transparent 52%, rgba(0,0,0,.55) 100%); }
  #grain { position:fixed; inset:-50%; width:200%; height:200%; pointer-events:none; z-index:4; opacity:.06;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    animation: grain 7s steps(8) infinite; }
  @keyframes grain { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-2%,1%)} 50%{transform:translate(1%,-2%)} 75%{transform:translate(-1%,2%)} }
  @media (prefers-reduced-motion: reduce){ #grain{animation:none} }

  /* ---- title gate ---- */
  #gate { position:fixed; inset:0; z-index:10; background:#090b0e;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:6vw; transition:opacity 2.6s ease; }
  #gate.gone { opacity:0; pointer-events:none; }
  #gate .epigraph { color:#9aa3ad; font-style:italic; font-size:clamp(16px,4.4vw,21px); letter-spacing:.10em; margin-bottom:2.6em; }
  #gate h1 { color:var(--ink); font-weight:400; font-size:clamp(27px,7.4vw,54px); line-height:1.22; letter-spacing:.06em; max-width:14em; }
  #gate .author { color:#a89f88; font-size:clamp(14px,3.9vw,18px); letter-spacing:.30em; text-transform:uppercase; margin-top:2em; }
  #gate .credit { color:#7d8aa6; font-style:italic; font-size:clamp(13px,3.6vw,16px); letter-spacing:.12em; margin-top:1.1em; }
  #begin { margin-top:3.4em; background:none; color:var(--ink); border:1px solid #4a4538; border-radius:2px;
    font-family:inherit; font-size:clamp(14px,3.8vw,17px); letter-spacing:.42em; text-indent:.42em;
    padding:1.05em 2.6em; cursor:pointer; transition:border-color .5s, color .5s; }
  #begin:hover, #begin:focus-visible { border-color:#a89c78; color:#f0e8d2; outline:none; }
  /* heartbeat: lub-dub … lub-dub … */
  #begin.beating { border-color:#8a4a42; color:#f0e8d2; animation:heart 1.15s ease-out 3; }
  @keyframes heart {
    0%   { box-shadow:0 0 0 0 rgba(196,72,58,0); }
    8%   { box-shadow:0 0 34px 6px rgba(196,72,58,.55); }
    18%  { box-shadow:0 0 12px 2px rgba(196,72,58,.18); }
    28%  { box-shadow:0 0 30px 5px rgba(196,72,58,.45); }
    50%  { box-shadow:0 0 4px 0 rgba(196,72,58,.06); }
    100% { box-shadow:0 0 0 0 rgba(196,72,58,0); }
  }
  #sound { color:#8d96a2; font-size:clamp(13px,3.6vw,16px); letter-spacing:.16em; margin-top:2.4em; }
  #sound .ic { display:inline-block; transform:translateY(2px); margin-right:.5em; }
  #loadnote { color:#8d96a2; font-size:clamp(13px,3.5vw,15px); letter-spacing:.18em; margin-top:1.2em; min-height:1.2em; }

  /* ---- scroll cue ---- */
  #hint { position:fixed; left:0; right:0; bottom:max(4.5dvh, env(safe-area-inset-bottom)); z-index:5; text-align:center;
    color:#a9a394; font-size:14px; letter-spacing:.34em; text-indent:.34em; text-transform:uppercase;
    opacity:0; transition:opacity 1.6s ease; pointer-events:none; }
  #hint .chev { display:block; font-size:22px; letter-spacing:0; text-indent:0; margin-bottom:.35em;
    animation:rise 2.4s ease-in-out infinite; }
  @keyframes rise { 0%,100%{transform:translateY(6px);opacity:.35} 50%{transform:translateY(-6px);opacity:.95} }
  #hint.show { opacity:.85; }
  #hint.show.fade { opacity:0 !important; }

  /* ---- ending ---- */
  #again { position:fixed; left:0; right:0; bottom:max(6dvh, env(safe-area-inset-bottom)); z-index:5; text-align:center;
    color:#8d8775; font-style:italic; font-size:17px; letter-spacing:.3em; text-indent:.3em;
    opacity:0; transition:opacity 2.5s ease; cursor:pointer; pointer-events:none; }
  #again.show { opacity:.8; pointer-events:auto; }
</style>
</head>
<body>
<div id="spacer"></div>
<canvas id="stage"></canvas>
<div id="vignette"></div>
<div id="grain"></div>
<div id="hint"><span class="chev">↑</span><span id="hintword">scroll</span></div>
<div id="again">again</div>
<div id="gate">
  <div class="epigraph">a sonnet on technology, read through pixel&nbsp;fog</div>
  <h1>The World Is Too Much with&nbsp;Us</h1>
  <div class="author">William Wordsworth · 1807</div>
  <div class="credit">Interpreted by Claude Fable 5 · 2026</div>
  <button id="begin">Begin</button>
  <div id="sound"><span class="ic">♪</span>turn your sound on</div>
  <div id="loadnote"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

/* ============================== ASSETS ============================== */
const IMG = {
  watch:      "https://res.cloudinary.com/du8ydfy3a/image/upload/q_auto/f_auto/v1781057105/watch_rhanx8.png",
  coins:      "https://res.cloudinary.com/du8ydfy3a/image/upload/q_auto/f_auto/v1781057129/coins_uoeq3e.png",
  datacenter: "https://res.cloudinary.com/du8ydfy3a/image/upload/q_auto/f_auto/v1781057831/datacenter_a_jbyr4s.png",
  sea:        "https://res.cloudinary.com/du8ydfy3a/image/upload/q_auto/f_auto/v1781057104/sea_skejkf.png",
  winds:      "https://res.cloudinary.com/du8ydfy3a/image/upload/q_auto/f_auto/v1781057104/winds_zo7el3.png",
  lea:        "https://res.cloudinary.com/du8ydfy3a/image/upload/q_auto/f_auto/v1781057104/lea_x8aiul.png",
  proteus:    "https://res.cloudinary.com/du8ydfy3a/image/upload/q_auto/f_auto/v1781057155/proteus_t8oau5.png",
  triton:     "https://res.cloudinary.com/du8ydfy3a/image/upload/q_auto/f_auto/v1781057155/triton_wd5k45.png",
  moon:       "https://res.cloudinary.com/du8ydfy3a/image/upload/q_auto/f_auto/v1781057103/moon_f2032x.png"
};
const AUD = {
  music: "https://res.cloudinary.com/du8ydfy3a/video/upload/q_auto/f_auto/v1781056000/Moonlit_Tides_vpznpb.mp3",
  clock: "https://res.cloudinary.com/du8ydfy3a/video/upload/q_auto/f_auto/v1781057358/clock_fqtvva.mp3",
  data:  "https://res.cloudinary.com/du8ydfy3a/video/upload/q_auto/f_auto/v1781059989/ES_User_Interface_Data_Feedback_1980_s_Digital_Data_Transfer_Modulated_Low_-_Epidemic_Sound_fmc9bi.mp3",
  bells: "https://res.cloudinary.com/du8ydfy3a/video/upload/q_auto/f_auto/v1781057360/bells_oufbvd.mp3",
  wind:  "https://res.cloudinary.com/du8ydfy3a/video/upload/q_auto/f_auto/v1781061104/wind_v2_zdsifi.mp3",
  wave:  "https://res.cloudinary.com/du8ydfy3a/video/upload/q_auto/f_auto/v1781057359/wave_tohjv5.mp3",
  horn:  "https://res.cloudinary.com/du8ydfy3a/video/upload/q_auto/f_auto/v1781057360/horn_g1cvjn.mp3"
};

/* ============================== CORE ============================== */
const COURSE = 760;
const isPortrait = () => innerHeight > innerWidth;
const mobile = matchMedia("(pointer:coarse)").matches;
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
const S = (a,b,x)=>{const k=Math.min(1,Math.max(0,(x-a)/(b-a)));return k*k*(3-2*k);};

const canvas = document.getElementById("stage");
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(isPortrait()?74:60, innerWidth/innerHeight, .1, 280);

/* the rail: sinks through the octave, stills, rises through the sestet */
const camZ = p => 8 - p*COURSE;
const pathX = p => Math.sin(p*5.2)*3.4;
const pathY = p => -5.0*S(.04,.50,p) + 9.0*S(.58,.86,p);

scene.fog = new THREE.FogExp2(0x12161a,.03);
scene.background = new THREE.Color(0x12161a);
const FOGK = [
  {t:0.00, c:new THREE.Color(0x12161a), d:.030},
  {t:0.22, c:new THREE.Color(0x141a1b), d:.035},
  {t:0.48, c:new THREE.Color(0x0c0f12), d:.044},
  {t:0.585,c:new THREE.Color(0x0a0d11), d:.050},
  {t:0.665,c:new THREE.Color(0x0b1733), d:.020},
  {t:0.82, c:new THREE.Color(0x0d1d3f), d:.0155},
  {t:1.00, c:new THREE.Color(0x091228), d:.0118}
];
function fogAt(p){
  let a=FOGK[0],b=FOGK[FOGK.length-1];
  for(let i=0;i<FOGK.length-1;i++) if(p>=FOGK[i].t&&p<=FOGK[i+1].t){a=FOGK[i];b=FOGK[i+1];break;}
  const k=(p-a.t)/Math.max(b.t-a.t,1e-5), e=k*k*(3-2*k);
  scene.fog.color.copy(a.c).lerp(b.c,e);
  scene.fog.density=a.d+(b.d-a.d)*e;
  scene.background.copy(scene.fog.color);
}
const visH = d => 2*d*Math.tan(THREE.MathUtils.degToRad(camera.fov)/2);
const visW = d => visH(d)*camera.aspect;

/* ============================== TEXT ============================== */
const FONT_READY = document.fonts.load("500 96px 'Cormorant Garamond'").catch(()=>{});
function makeTextSprite(text,opt){
  const fpx=96, lh=1.42, pad=80;
  const cv=document.createElement("canvas"), g=cv.getContext("2d");
  const style=(opt.italic?"italic ":"")+"500 "+fpx+"px 'Cormorant Garamond', Georgia, serif";
  g.font=style; if("letterSpacing" in g) g.letterSpacing="0.06em";
  const s=opt.worldH/fpx, maxPx=opt.maxW/s;
  const words=text.split(" "), lines=[]; let cur="";
  for(const w of words){
    const t=cur?cur+" "+w:w;
    if(g.measureText(t).width>maxPx && cur){lines.push(cur);cur=w;} else cur=t;
  }
  lines.push(cur);
  const wpx=Math.max(...lines.map(l=>g.measureText(l).width));
  cv.width=Math.ceil(wpx+pad*2); cv.height=Math.ceil(lines.length*fpx*lh+pad*2);
  g.font=style; if("letterSpacing" in g) g.letterSpacing="0.06em";
  g.textAlign="center"; g.textBaseline="middle";
  // pass 1: deep dark halo for legibility against bright apparitions
  g.shadowColor="rgba(2,4,10,0.95)"; g.shadowBlur=30; g.fillStyle="rgba(2,4,10,0.85)";
  lines.forEach((l,i)=>{ g.fillText(l,cv.width/2,pad+fpx*lh*(i+.5));
                         g.fillText(l,cv.width/2,pad+fpx*lh*(i+.5)); });
  // pass 2: the ink, with its glow
  g.shadowColor=opt.glow||"rgba(255,250,230,.34)"; g.shadowBlur=24;
  g.fillStyle=opt.colour||"#d8d2c2";
  lines.forEach((l,i)=>g.fillText(l,cv.width/2,pad+fpx*lh*(i+.5)));
  const tex=new THREE.CanvasTexture(cv); tex.minFilter=THREE.LinearFilter; tex.anisotropy=4;
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,opacity:0});
  return new THREE.Mesh(new THREE.PlaneGeometry(cv.width*s,cv.height*s),mat);
}

const READ_D=15, NEAR_D=11;           // text sized to fit the frustum at its NEAREST visible distance
const SILVER="#cdd2d3", WARM="#e8dcb8", DIM="#9aa0a3", GOLD="#f0e2b0";
const LINES=[
  {t:.045, txt:"The world is too much with us; late and soon,", c:SILVER},
  {t:.105, txt:"Getting and spending, we lay waste our powers;—", c:SILVER, scatter:true},
  {t:.175, txt:"Little we see in Nature that is ours;", c:SILVER},
  {t:.250, txt:"We have given our hearts away, a sordid boon!", c:SILVER},
  {t:.330, txt:"This Sea that bares her bosom to the moon;", c:SILVER},
  {t:.400, txt:"The winds that will be howling at all hours,", c:SILVER},
  {t:.462, txt:"And are up-gathered now like sleeping flowers;", c:SILVER},
  {t:.518, txt:"For this, for everything, we are out of tune;", c:SILVER},
  {t:.572, txt:"It moves us not.", c:DIM, small:true, glow:"rgba(150,150,150,.14)"},
  {t:.622, txt:"Great God! I’d rather be", c:GOLD, big:true, glow:"rgba(255,220,150,.55)"},
  {t:.672, txt:"A Pagan suckled in a creed outworn;", c:WARM},
  {t:.726, txt:"So might I, standing on this pleasant lea,", c:WARM},
  {t:.778, txt:"Have glimpses that would make me less forlorn;", c:WARM},
  {t:.836, txt:"Have sight of Proteus rising from the sea;", c:WARM},
  {t:.896, txt:"Or hear old Triton blow his wreathèd horn.", c:WARM, yo:-2.2},
  {t:.990, txt:"William Wordsworth — 1807", c:"#b9b29c", italic:true, keep:true,
            glow:"rgba(220,210,180,.25)"}
];
const textMeshes=[];
function place(m, t, d, ox, oy){
  m.position.set(pathX(t)+(ox||0), pathY(t)+(oy||0), camZ(t)-d);
  m.userData.base=m.position.clone();
}
function buildText(){
  const maxW = visW(NEAR_D)*.86;
  const baseH = Math.min(visW(NEAR_D)*.058, .92);
  LINES.forEach(L=>{
    const h=baseH*(L.big?1.5:L.small?.8:1);
    if(L.scatter){
      const group=new THREE.Group(); const words=L.txt.split(" ");
      const meas=document.createElement("canvas").getContext("2d");
      meas.font="500 96px 'Cormorant Garamond', Georgia, serif";
      const s=h/96, gap=h*.62;
      const ws=words.map(w=>meas.measureText(w).width*s);
      const rows=[], maxRow=maxW; let row=[],rw=0;
      ws.forEach((w,i)=>{ if(rw+w>maxRow&&row.length){rows.push(row);row=[];rw=0;} row.push(i); rw+=w+gap; });
      rows.push(row);
      rows.forEach((r,ri)=>{
        const total=r.reduce((a,i)=>a+ws[i],0)+gap*(r.length-1);
        let x=-total/2;
        r.forEach(i=>{
          const m=makeTextSprite(words[i],{worldH:h,colour:L.c,maxW:99});
          m.position.set(x+ws[i]/2, -(ri-(rows.length-1)/2)*h*1.7, 0); x+=ws[i]+gap;
          m.userData.scat={dx:(Math.random()-.5)*8, dy:-2-Math.random()*4, rot:(Math.random()-.5)*1.0};
          group.add(m);
        });
      });
      place(group, L.t, READ_D, 0, 0);
      group.userData.beat=L; group.userData.scatterGroup=true;
      scene.add(group); textMeshes.push(group);
    } else {
      const m=makeTextSprite(L.txt,{worldH:h,colour:L.c,glow:L.glow,italic:L.italic,maxW});
      place(m, L.t, READ_D, 0, (L.yo||0)+(L.small?-.2:0));
      m.userData.beat=L;
      scene.add(m); textMeshes.push(m);
    }
  });
}

/* ============================== APPARITIONS ============================== */
const loader=new THREE.TextureLoader(); loader.crossOrigin="anonymous";
const ART=[
  {key:"watch",      t:.078, x:-.28, y:.16,  w:.58, d:24},
  {key:"coins",      t:.138, x:.28,  y:-.08, w:.60, d:24},
  {key:"datacenter", t:.210, x:0,    y:.04,  w:.92, d:52},
  {key:"sea",        t:.352, x:0,    y:.10,  w:1.00,d:32},
  {key:"winds",      t:.436, x:-.24, y:.14,  w:.64, d:26},
  {key:"lea",        t:.728, x:0,    y:-.14, w:1.10,d:30, add:true},
  {key:"proteus",    t:.806, x:0,    y:0,    w:1.50,d:30, add:true, rise:true},
  {key:"triton",     t:.888, x:.28,  y:.10,  w:.80, d:26, add:true},
  {key:"moon",       t:.945, x:0,    y:.30,  w:.58, d:30, add:true}
];
const artMeshes=[];
function buildArt(){
  ART.forEach(A=>{
    loader.load(IMG[A.key], tex=>{
      tex.minFilter=THREE.LinearFilter; tex.anisotropy=4;
      const ar=tex.image.height/tex.image.width;
      const Wd=visW(A.d)*A.w, Hd=Wd*ar;
      const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,opacity:0,
        blending:A.add?THREE.AdditiveBlending:THREE.NormalBlending});
      const m=new THREE.Mesh(new THREE.PlaneGeometry(Wd,Hd),mat);
      const oy=visH(A.d)*A.y + (A.rise? -Hd*.95 : 0);
      place(m, A.t, A.d, visW(A.d)*A.x, oy);
      m.userData.art=A; m.userData.H=Hd; m.userData.phase=Math.random()*6.28;
      scene.add(m); artMeshes.push(m);
    });
  });
}

/* ============================== PARTICLES ============================== */
function makePoints(n,spread,colour,size,zFrom,zTo,additive){
  const pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    pos[i*3]=(Math.random()-.5)*spread;
    pos[i*3+1]=(Math.random()-.5)*spread*.7;
    pos[i*3+2]=zFrom+Math.random()*(zTo-zFrom);
  }
  const g=new THREE.BufferGeometry(); g.setAttribute("position",new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color:colour,size,transparent:true,opacity:0,
    sizeAttenuation:true,depthWrite:false,blending:additive?THREE.AdditiveBlending:THREE.NormalBlending});
  const pts=new THREE.Points(g,m); scene.add(pts); return pts;
}
const motes=makePoints(mobile?240:600, 50, 0xbfc6c9, .07, 20, -COURSE-30, false);
const stars=makePoints(mobile?320:700, 100, 0xcfe0ff, .10, camZ(.6), -COURSE-80, true);

/* ============================== AUDIO ============================== */
const audio={ready:false,ctx:null,filter:null,musicGain:null,musicSrc:null,
             clockGain:null,dataGain:null,sfx:{},master:null,fallback:null};
async function initAudio(note){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    const ctx=new Ctx(); audio.ctx=ctx;
    audio.master=ctx.createGain(); audio.master.connect(ctx.destination);
    note("waking the sea…");
    const fb=async u=>{const r=await fetch(u);return await ctx.decodeAudioData(await r.arrayBuffer());};
    const [mus,clk,dat,bel,wnd,wav,hrn]=await Promise.all(
      [AUD.music,AUD.clock,AUD.data,AUD.bells,AUD.wind,AUD.wave,AUD.horn].map(fb));
    const src=ctx.createBufferSource(); src.buffer=mus; src.loop=true; audio.musicSrc=src;
    audio.filter=ctx.createBiquadFilter(); audio.filter.type="lowpass";
    audio.filter.frequency.value=260; audio.filter.Q.value=.7;
    audio.musicGain=ctx.createGain(); audio.musicGain.gain.value=0;
    src.connect(audio.filter); audio.filter.connect(audio.musicGain);
    audio.musicGain.connect(audio.master); src.start();
    const mkLoop=(buf)=>{const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;
      const g=ctx.createGain();g.gain.value=0;s.connect(g);g.connect(audio.master);s.start();return g;};
    audio.clockGain=mkLoop(clk);
    audio.dataGain=mkLoop(dat);
    audio.sfx={bells:bel,wind:wnd,wave:wav,horn:hrn};
    audio.ready=true;
  }catch(e){
    try{const el=new Audio(AUD.music);el.loop=true;el.volume=0;el.play();audio.fallback=el;}catch(_){}
  }
}
function playSfx(n,g0){
  if(!audio.ready)return;
  const s=audio.ctx.createBufferSource(); s.buffer=audio.sfx[n];
  const g=audio.ctx.createGain(); g.gain.value=g0;
  s.connect(g); g.connect(audio.master); s.start();
}
const TRIGGERS=[
  {t:.248, fire:()=>playSfx("bells",.85)},
  {t:.395, fire:()=>playSfx("wind",.85)},
  {t:.772, fire:()=>playSfx("wave",.95)},   // "forlorn" — as Proteus begins to rise
  {t:.878, fire:()=>playSfx("horn",1.0)}
].map(o=>(o.armed=true,o));

function audioFrame(p,t){
  if(audio.fallback){audio.fallback.volume=Math.min(.8,Math.max(0,p*8));return;}
  if(!audio.ready)return;
  let f;
  if(p<.545)      f=240+p*680;
  else if(p<.605) f=610-(p-.545)*6800;                       // sink at the dead line
  else if(p<.685) {const k=(p-.605)/.08; f=200*Math.pow(16000/200,k*k*(3-2*k));}  // the volta
  else            f=16000;
  audio.filter.frequency.value=Math.max(120,f);
  let g=.72;
  if(p<.03) g=.72*(p/.03);
  if(p>.545&&p<.615) g=.72-.5*Math.sin(Math.PI*(p-.545)/.07);
  if(p>.615) g=Math.min(.95,.72+(p-.615)*.9);
  audio.musicGain.gain.value+=(g-audio.musicGain.gain.value)*.04;
  // "out of tune": the music itself detunes, almost subliminally, then snaps true
  const w=S(.505,.525,p)*(1-S(.555,.575,p));
  audio.musicSrc.playbackRate.value=1+Math.sin(t*3.1)*.0045*w;
  // proximity loops
  const ck=Math.exp(-Math.pow((p-.078)/.045,2))*.5;
  audio.clockGain.gain.value+=(ck-audio.clockGain.gain.value)*.06;
  const dt=Math.exp(-Math.pow((p-.208)/.050,2))*.55;
  audio.dataGain.gain.value+=(dt-audio.dataGain.gain.value)*.06;
  TRIGGERS.forEach(tr=>{
    if(tr.armed&&p>=tr.t){tr.armed=false;tr.fire();}
    if(!tr.armed&&p<tr.t-.06)tr.armed=true;
  });
}

/* ============================== SCROLL & INPUT ============================== */
const spacer=document.getElementById("spacer");
const sizeSpacer=()=>spacer.style.height=(innerHeight*21)+"px";
sizeSpacer();
let target=0, prog=0, started=false;
addEventListener("scroll",()=>{
  const max=document.documentElement.scrollHeight-innerHeight;
  target=Math.min(1,Math.max(0,scrollY/max));
  if(started&&target>.004) hint.classList.add("fade");
},{passive:true});
let mx=0,my=0;
addEventListener("pointermove",e=>{
  if(mobile)return;
  mx=(e.clientX/innerWidth-.5)*2; my=(e.clientY/innerHeight-.5)*2;
},{passive:true});
addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.fov=isPortrait()?74:60;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  sizeSpacer();
});

/* ============================== FRAME LOOP ============================== */
const clock3=new THREE.Clock();
const againEl=document.getElementById("again");
function animate(){
  requestAnimationFrame(animate);
  const t=clock3.getElapsedTime();
  prog+=(target-prog)*(reduceMotion?.12:.05);
  const sway=reduceMotion?0:1;
  const cz=camZ(prog);
  camera.position.set(
    pathX(prog)+Math.sin(t*.21)*.3*sway+mx*.8,
    pathY(prog)+Math.sin(t*.16)*.2*sway-my*.5,
    cz);
  const la=Math.min(1,prog+.03);
  camera.lookAt(pathX(la)+mx*1.6, pathY(la)-my*1.0, camZ(la));

  fogAt(prog);

  textMeshes.forEach(m=>{
    const beat=m.userData.beat;
    const d=cz-m.position.z;
    let vis=(1-S(28,42,d))*(beat.keep?1:S(8,12,d));
    m.quaternion.copy(camera.quaternion);
    if(m.userData.scatterGroup){
      const pass=S(0,1,(prog>beat.t?(prog-beat.t)/.05:0));
      m.children.forEach(w=>{
        w.material.opacity=vis*(1-pass*.85);
        const sc=w.userData.scat, b=w.userData;
        if(!b.bx){b.bx=w.position.x;b.by=w.position.y;}
        w.position.x=b.bx+sc.dx*pass;
        w.position.y=b.by+sc.dy*pass;
        w.rotation.z=sc.rot*pass;
      });
    } else {
      m.material.opacity=vis*(beat.small?.85:1);
      const breathe=.97+.03*(1-S(28,42,d));
      m.scale.setScalar(breathe);
      m.position.y=m.userData.base.y+Math.sin(t*.4+m.userData.base.z)*.06*sway;
    }
  });

  artMeshes.forEach(m=>{
    const A=m.userData.art, d=cz-m.position.z, ph=m.userData.phase, b=m.userData.base;
    const vis=(1-S(34,52,d))*S(6,14,d);
    m.material.opacity=vis*(A.add?1:.96);
    m.quaternion.copy(camera.quaternion);
    m.rotateZ(Math.sin(t*.11+ph)*.012*sway);
    m.position.x=b.x+Math.sin(t*.18+ph)*.35*sway;
    if(A.rise){
      const k=S(.748,.832,prog);   // begins rising with "forlorn"
      m.position.y=b.y+(m.userData.H*.95+visH(A.d)*.02)*k;
    } else {
      m.position.y=b.y+Math.sin(t*.14+ph)*.30*sway;
    }
  });

  motes.material.opacity=.5*(1-S(.58,.68,prog))+.16;
  motes.rotation.z=t*.004*sway;
  stars.material.opacity=.55*S(.62,.74,prog)+.4*S(.93,1,prog);

  if(prog>.965) againEl.classList.add("show"); else againEl.classList.remove("show");

  audioFrame(prog,t);
  renderer.render(scene,camera);
}

/* ============================== BOOT ============================== */
const gate=document.getElementById("gate"), hint=document.getElementById("hint"),
      note=document.getElementById("loadnote"), begin=document.getElementById("begin");
document.getElementById("hintword").textContent = mobile ? "swipe up" : "scroll";
const setNote=s=>note.textContent=s;
let booted=false;
(async function boot(){
  if(booted)return; booted=true;
  await FONT_READY;
  buildText(); buildArt();
  animate();
})();
begin.addEventListener("click", async ()=>{
  begin.disabled=true;
  begin.classList.add("beating");          // three heartbeats, then the fog
  setNote("listening for the tide…");
  const heart=new Promise(r=>setTimeout(r,3450));
  await Promise.all([initAudio(setNote), heart]);
  if(audio.ctx&&audio.ctx.state==="suspended") await audio.ctx.resume();
  scrollTo(0,0); target=0; prog=0; started=true;
  gate.classList.add("gone"); hint.classList.add("show");
  setTimeout(()=>gate.style.display="none",2800);
});
document.getElementById("again").addEventListener("click",()=>{
  scrollTo({top:0,behavior:"smooth"});
});
})();
</script>
